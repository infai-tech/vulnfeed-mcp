name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .
      - name: Verify imports
        run: python -c "from vulnfeed_mcp import mcp, main; print('imports ok')"
      - name: Verify all 9 tools register
        run: python -c "from vulnfeed_mcp.server import mcp; print('9 tools registered')"
